version: 2

models:
  - name: src_ecommerce__orders
    description: "Table of 1 row per order"
    columns:
      - name: order_id
        description: "ID of order"
        tests:
          - not_null
          - unique

      - name: user_id
        description: "ID of user"
        tests:
          - not_null

      - name: status
        description: "Order status"
        tests:
          - not_null
          - accepted_values:
              name: unexpected_order_status # We can name our tests to make it easier to give more meaningful errors
              values:
                - Processing
                - Cancelled
                - Shipped
                - Complete
                - Returned

      - name: created_at
        description: "Date when order was created"
        tests:
          - not_null

      - name: returned_at
        description: "Date when order was returned"
        tests:
          - not_null:
              where: "status = 'Returned'"

      - name: shipped_at
        description: "Date when order was shipped"
        tests:
          - not_null:
              where: "status = 'Shipped'"

      - name: delivered_at
        description: "Date when order was delivered"
        tests:
          - not_null:
              where: "returned_at IS NOT NULL OR status = 'Complete'"

      - name: num_of_item
        description: "Number of items in this order"
        tests:
          - not_null